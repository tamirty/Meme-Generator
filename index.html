<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Meme Generator 2026</title>
</head>

<body onload="onInit()">
    <header>
        <h1>Meme Generator 2026</h1>
    </header>

    <section class="gallery-container">
        <div class="gallery"></div>
    </section>  
    
    <section class="editor-container">
        <div class="canvas-container">
            <canvas height="400" onclick="onAddText(event)"></canvas>
        </div>
        <input type="text" oninput="setLineTxt(this.value)">
    </section>

    <script src="js/services/util.service.js"></script>
    <script src="js/services/meme.service.js"></script>
    <script src="js/meme.controller.js"></script>
    <script src="js/gallery.controller.js"></script>
</body>
</html>
