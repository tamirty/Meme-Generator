<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/styles.css">
    <script src="https://kit.fontawesome.com/6b5bb420eb.js" crossorigin="anonymous"></script>
    <title>Meme Generator 2026</title>
</head>

<body class="main-layout" onload="onInit()">

    <div class="main-screen" onclick="toggleMenu()"></div>

    <header class="main-header flex align-center space-between">

        <div class="main-logo" onclick="showGallery()">Meme Gen 2026</div>

        <nav class="main-nav">
            <ul class="clean-li flex">
                <li><a href="#" onclick="showGallery()">Gallery</a></li>
                <li><a href="#" onclick="showEditor()">Editor</a></li>
                <li><a href="#" onclick="showSavedMemes()">Saved Memes</a></li>
            </ul>
        </nav>
        <button class="btn-menu" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
    </header>

    <section class="gallery-container">
        <div class="gallery"></div>
    </section>  
    
    <section class="editor-container flex align-center hidden">

        <div class="canvas-container">
            <canvas width="400"></canvas>
        </div>

        <div class="btns-container flex">
            <input type="text" class="txt-input" oninput="onSetLineTxt(this.value)">
            <div class="actions">
                <input class="color-picker" type="color" value="#000000" oninput="onSetColor(this.value)"/>
                <button onclick="onIncreaseFont()">A+</button>
                <button onclick="onDecreaseFont()">A-</button>
                <button onclick="onAddNewLine()">Add Line</button>
                <button onclick="onRemoveLine()"><i class="fa-solid fa-trash"></i></button>
                <button onclick="onSwitchLine()">Switch</button>
            </div>
            <div class="download-btns flex align-center">
                <a href="#" onclick="onDownloadImg(this)" download="file-name">Download <i class="fa-solid fa-file-arrow-down"></i></a>
                <button onclick="onSaveMeme()">Save Meme <i class="fa-solid fa-cloud-arrow-down"></i></button>
            </div>
        </div>

    </section>

    <section class="saved-memes flex hidden"></section>

    <footer class="main-footer flex align-center">
        <small>All rights reserved to Meme Generator 2026 LTD</small>
    </footer>

    <script src="js/services/util.service.js"></script>
    <script src="js/services/meme.service.js"></script>
    <script src="js/meme.controller.js"></script>
    <script src="js/gallery.controller.js"></script>
</body>
</html>
